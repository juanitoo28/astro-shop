[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ── Redirects API admin → Netlify Functions ──────────────────
[[redirects]]
  from   = "/admin/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# ── SPA fallback pour les routes Astro ───────────────────────
[[redirects]]
  from   = "/product/*"
  to     = "/product/:splat/index.html"
  status = 200

# ── Headers de sécurité ──────────────────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options     = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control       = "no-store"
