<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Boutique</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0F0F0E; --surface: #181817; --surface2: #212120; --border: #2A2A28;
      --text: #F0EFE9; --muted: #888880; --accent: #D4B896; --accent-dim: #8C7A65;
      --danger: #C25A5A; --success: #6A9E7A; --radius: 6px; --sidebar: 240px;
      --font: 'DM Sans', system-ui, sans-serif; --font-d: 'Cormorant', serif;
    }
    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font); cursor: pointer; border: none; background: none; }
    input, textarea, select {
      font-family: var(--font); font-size: 13px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius);
      padding: 0.55rem 0.75rem; width: 100%; outline: none; transition: border-color .2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    label { display: block; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: .4rem; }
    .field { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1.1rem; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 2.5rem; width: 360px; animation: fadeUp .4s ease; }
    .login-box h1 { font-family: var(--font-d); font-size: 1.8rem; font-weight: 400; margin-bottom: .5rem; }
    .login-box p  { color: var(--muted); font-size: 12px; margin-bottom: 2rem; }

    #app { display: none; height: 100vh; overflow: hidden; }
    .app-inner { display: flex; height: 100%; }

    .sidebar { width: var(--sidebar); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem 1rem; }
    .sidebar__logo { font-family: var(--font-d); font-size: 1.3rem; letter-spacing: .15em; color: var(--accent); padding: .5rem .75rem 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
    .nav-item { display: flex; align-items: center; gap: .75rem; padding: .6rem .75rem; border-radius: var(--radius); font-size: 13px; color: var(--muted); cursor: pointer; transition: all .15s; user-select: none; }
    .nav-item:hover, .nav-item.active { color: var(--text); background: var(--surface2); }
    .sidebar__spacer { flex: 1; }
    .sidebar__version { font-size: 11px; color: var(--border); padding: .5rem .75rem; }

    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.75rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; background: color-mix(in srgb, var(--bg) 85%, transparent); backdrop-filter: blur(12px); }
    .topbar__title { font-size: 1rem; font-weight: 500; }
    .page-content { padding: 1.75rem; flex: 1; }

    .btn { display: inline-flex; align-items: center; gap: .45rem; padding: .55rem 1.1rem; border-radius: var(--radius); font-size: 12px; font-weight: 500; letter-spacing: .06em; transition: all .15s; cursor: pointer; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: #1A1A18; }
    .btn-primary:hover { opacity: .88; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent-dim); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-ghost { color: var(--muted); }
    .btn-ghost:hover { color: var(--text); }
    .btn-sm { padding: .35rem .75rem; font-size: 11px; }
    .btn:disabled { opacity: .4; pointer-events: none; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: 13px; font-weight: 500; letter-spacing: .05em; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

    .badge { display: inline-flex; padding: .2rem .6rem; border-radius: 100px; font-size: 11px; font-weight: 500; }
    .badge-success { background: color-mix(in srgb, var(--success) 20%, transparent); color: var(--success); }
    .badge-danger  { background: color-mix(in srgb, var(--danger)  20%, transparent); color: var(--danger); }
    .badge-accent  { background: color-mix(in srgb, var(--accent)  15%, transparent); color: var(--accent); }

    #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: .75rem 1.25rem; border-radius: 8px; font-size: 13px; box-shadow: 0 8px 32px rgba(0,0,0,.4); transform: translateY(20px); opacity: 0; transition: all .25s ease; pointer-events: none; display: flex; align-items: center; gap: .6rem; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--success); }
    #toast.error   { border-color: var(--danger); }

    .rebuild-banner { background: color-mix(in srgb, var(--accent) 12%, transparent); border: 1px solid var(--accent-dim); border-radius: var(--radius); padding: .65rem 1rem; font-size: 12px; color: var(--accent); display: none; align-items: center; gap: .6rem; margin-bottom: 1.25rem; }
    .rebuild-banner.show { display: flex; }

    .products-table { width: 100%; border-collapse: collapse; }
    .products-table th { text-align: left; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: .6rem 1rem; border-bottom: 1px solid var(--border); }
    .products-table td { padding: .75rem 1rem; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    .products-table tr:last-child td { border-bottom: none; }
    .products-table tr:hover td { background: var(--surface2); }
    .product-thumb { width: 44px; height: 56px; object-fit: cover; border-radius: 3px; background: var(--surface2); }
    .drag-handle { color: var(--muted); cursor: grab; padding: .25rem; display: inline-flex; align-items: center; }
    .drag-handle:active { cursor: grabbing; }
    .products-table tr.drag-over td { background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 500; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 100%; max-width: 720px; padding: 2rem; transform: translateY(-12px); transition: transform .25s ease; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
    .modal-header h2 { font-family: var(--font-d); font-size: 1.4rem; font-weight: 400; }
    .modal-footer { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

    .tags-input { display: flex; flex-wrap: wrap; gap: .4rem; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: .45rem .65rem; min-height: 40px; cursor: text; }
    .tags-input:focus-within { border-color: var(--accent); }
    .tag { display: inline-flex; align-items: center; gap: .35rem; background: var(--surface); border: 1px solid var(--border); padding: .2rem .6rem; border-radius: 100px; font-size: 12px; }
    .tag button { color: var(--muted); font-size: 14px; line-height: 1; }
    .tag button:hover { color: var(--danger); }
    .tags-input input { border: none; background: none; outline: none; padding: 0; font-size: 13px; min-width: 80px; flex: 1; }

    .color-row { display: grid; grid-template-columns: 36px 1fr 1fr auto; gap: .5rem; align-items: center; margin-bottom: .5rem; }
    .color-row input[type=color] { width: 36px; height: 36px; padding: 2px; border-radius: 50%; cursor: pointer; }

    .image-list { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: .75rem; }
    .image-thumb { position: relative; width: 80px; height: 100px; }
    .image-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
    .image-thumb__del { position: absolute; top: -6px; right: -6px; background: var(--danger); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }

    .cat-list { list-style: none; display: flex; flex-direction: column; gap: .5rem; }
    .cat-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: .65rem 1rem; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem 1.5rem; }
    .stat-card__label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
    .stat-card__value { font-family: var(--font-d); font-size: 2rem; font-weight: 400; }
    .stat-card__sub { font-size: 11px; color: var(--muted); margin-top: .25rem; }

    .toggle { position: relative; display: inline-block; width: 38px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; cursor: pointer; transition: background .2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--muted); left: 2px; top: 2px; transition: transform .2s, background .2s; }
    .toggle input:checked + .toggle-slider { background: color-mix(in srgb, var(--accent) 30%, transparent); border-color: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: var(--accent); }

    .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 1.25rem; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; font-size: 12px; color: var(--muted); }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 5%, transparent); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin   { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    /* ===== PUBLISH BUTTON ===== */
    .publish-btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .55rem 1.25rem; border-radius: var(--radius);
      font-size: 12px; font-weight: 600; letter-spacing: .06em;
      background: var(--accent); color: #1A1A18;
      border: none; cursor: pointer; transition: all .2s;
      position: relative;
    }
    .publish-btn:hover { opacity: .88; transform: translateY(-1px); }
    .publish-btn:disabled { opacity: .5; pointer-events: none; }
    .publish-btn .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #1A1A18; opacity: .5;
    }
    .publish-btn.has-changes .dot {
      background: #C25A5A; opacity: 1;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.4)} }
    .publish-btn.has-changes { box-shadow: 0 0 0 3px rgba(212,184,150,.25); }

    /* ===== MOBILE SIDEBAR ===== */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 98;
    }
    .sidebar-overlay.open { display: block; }
    .mobile-topbar-btn {
      display: none; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: var(--radius);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); cursor: pointer;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .grid-3 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0;
        z-index: 99; transform: translateX(-100%);
        transition: transform .3s cubic-bezier(.4,0,.2,1);
      }
      .sidebar.open { transform: translateX(0); }
      .mobile-topbar-btn { display: flex; }
      .topbar { gap: .75rem; }
      .topbar__title { font-size: .85rem; }
      .page-content { padding: 1rem; }
      .grid-2 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr; }
      .products-table th:nth-child(6),
      .products-table td:nth-child(6),
      .products-table th:nth-child(7),
      .products-table td:nth-child(7) { display: none; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .products-table th:nth-child(4),
      .products-table td:nth-child(4),
      .products-table th:nth-child(5),
      .products-table td:nth-child(5) { display: none; }
      .modal { padding: 1.25rem; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Administration</h1>
    <p>Accès réservé — entrez votre mot de passe</p>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="pw-input" placeholder="••••••••" />
    </div>
    <p id="login-error" style="color:var(--danger);font-size:12px;min-height:18px;margin-bottom:.75rem"></p>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Connexion</button>
  </div>
</div>

<div id="app">
  <div class="app-inner">

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__logo" id="sidebar-logo">ADMIN</div>
      <nav>
        <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Tableau de bord
        </div>
        <div class="nav-item" data-page="products" onclick="navigate('products')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Produits
        </div>
        <div class="nav-item" data-page="categories" onclick="navigate('categories')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h8M4 18h16"/></svg>
          Catégories
        </div>
        <div class="nav-item" data-page="brand" onclick="navigate('brand')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Marque
        </div>
        <div class="nav-item" data-page="stock" onclick="navigate('stock')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          Stocks
        </div>
        <div class="nav-item" data-page="hero" onclick="navigate('hero')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>
          Hero & À propos
        </div>
      </nav>
      <div class="sidebar__spacer"></div>
      <button class="nav-item" onclick="doLogout()" style="width:100%">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </button>
      <div class="sidebar__version">Netlify Edition</div>
    </aside>

    <main class="main">
      <div class="topbar">
        <!-- Hamburger mobile -->
        <button class="mobile-topbar-btn" onclick="openSidebar()" aria-label="Menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="topbar__title" id="topbar-title">Tableau de bord</div>
        <div id="topbar-actions" style="display:flex;align-items:center;gap:.75rem">
          <!-- Bouton Publier — toujours visible -->
          <button class="publish-btn" id="publish-btn" onclick="publishAll()" title="Envoie toutes les modifications sur GitHub et déclenche un rebuild Netlify">
            <span class="dot"></span>
            Publier
          </button>
        </div>
      </div>
      <div class="page-content" id="page-content"></div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nouveau produit</h2>
      <button class="btn btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveProduct()" id="modal-save-btn">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── API URLs (Netlify Functions via redirects) ────────────────
const API = {
  auth:     '/admin/api/auth',
  data:     '/admin/api/data',
  products: '/admin/api/products',
  settings: '/admin/api/settings',
  upload:   '/admin/api/upload',
};

let state = { data: null, editingId: null, currentPage: 'dashboard', dragSrc: null };
let authToken = localStorage.getItem('admin_token') || '';
let pendingData = null; // Modifications en attente (pas encore publiées)

// ── Pending changes ──────────────────────────────────────────
function markChanged(newData) {
  pendingData = JSON.parse(JSON.stringify(newData)); // deep copy
  state.data = pendingData;
  document.getElementById('publish-btn')?.classList.add('has-changes');
}

function clearPending() {
  pendingData = null;
  document.getElementById('publish-btn')?.classList.remove('has-changes');
}

// ── Sidebar mobile ────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar')?.classList.add('open');
  document.getElementById('sidebar-overlay')?.classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('open');
}

// ── Helpers ──────────────────────────────────────────────────
async function apiFetch(url, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
  };
  if (authToken) opts.headers['Authorization'] = `Bearer ${authToken}`;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}

let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}


// ── AUTH ─────────────────────────────────────────────────────
async function checkAuth() {
  const r = await apiFetch(API.auth + '?action=check');
  if (r.authenticated) { showApp(); return; }
  // Try stored token
  if (authToken) {
    localStorage.removeItem('admin_token');
    authToken = '';
  }
}

async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  const r  = await apiFetch(API.auth + '?action=login', 'POST', { password: pw });
  if (r.ok) {
    // Store token from response if cookies don't work (cross-origin dev)
    showApp();
  } else {
    document.getElementById('login-error').textContent = r.error || 'Erreur';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogout() {
  await apiFetch(API.auth + '?action=logout', 'POST');
  localStorage.removeItem('admin_token');
  authToken = '';
  location.reload();
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await loadData();
  navigate('dashboard');
}

// ── DATA ─────────────────────────────────────────────────────
async function loadData() {
  const r = await apiFetch(API.data);
  if (r.error) { toast('Erreur chargement données', 'error'); return; }
  state.data = r;

// ── Publier tout en un seul commit GitHub ────────────────────
async function publishAll() {
  if (!pendingData) {
    toast('Aucune modification à publier', 'error');
    return;
  }
  const btn = document.getElementById('publish-btn');
  btn.disabled = true;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Publication…`;

  try {
    // Envoie tout le data.json en un seul appel API
    const r = await apiFetch(API.settings + '?section=all', 'POST', pendingData);
    if (r.ok) {
      clearPending();
      toast('✓ Publié ! Netlify rebuild en cours (~1-2 min)');
    } else {
      toast(r.error || 'Erreur lors de la publication', 'error');
    }
  } catch(e) {
    toast('Erreur réseau', 'error');
  }

  btn.disabled = false;
  btn.innerHTML = `<span class="dot"></span> Publier`;
}

// Drag & Drop
function initDragDrop() {}
function dragStart(e) { state.dragSrc = e.currentTarget; e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e)  { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function dragDrop(e) {
  e.preventDefault();
  const target = e.currentTarget; target.classList.remove('drag-over');
  if (!state.dragSrc || state.dragSrc === target) return;
  const tbody = document.getElementById('products-tbody');
  const rows  = [...tbody.querySelectorAll('tr')];
  const si = rows.indexOf(state.dragSrc), ti = rows.indexOf(target);
  if (si < ti) tbody.insertBefore(state.dragSrc, target.nextSibling);
  else tbody.insertBefore(state.dragSrc, target);
  const ids = [...tbody.querySelectorAll('tr')].map(r => r.dataset.id);
  const indexed = Object.fromEntries(state.data.products.map(p => [p.id, p]));
  state.data.products = ids.map((id, i) => ({ ...indexed[id], order: i }));
  markChanged(state.data);
  toast('Ordre modifié — clique Publier pour mettre en ligne');
}

async function deleteProduct(id) {

  state.data.products = state.data.products.filter(p => p.id !== id);

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Tags
function initTagsInputs() {
  ['details','sizes'].forEach(target => {
    const container = document.getElementById(`tags-${target}`);
    const hidden    = document.getElementById(`f-${target}`);
    let values = JSON.parse(hidden.value || '[]');
    function render() {
      container.innerHTML = '';
      values.forEach((v, i) => {
        const tag = document.createElement('span'); tag.className = 'tag';
        tag.innerHTML = `${esc(v)}<button onclick="removeTagFn('${target}',${i})">×</button>`;
        container.appendChild(tag);
      });
      const inp = document.createElement('input');
      inp.placeholder = target === 'sizes' ? 'XS, S…' : 'Ajouter…';
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          const val = inp.value.trim().replace(/,$/, '');
          if (val) { values.push(val); hidden.value = JSON.stringify(values); render(); }
        }
        if (e.key === 'Backspace' && !inp.value && values.length) { values.pop(); hidden.value = JSON.stringify(values); render(); }
      });
      container.appendChild(inp); inp.focus();
    }
    render();
    container.addEventListener('click', () => container.querySelector('input')?.focus());
    window.removeTagFn = (t, i) => { if (t === target) { values.splice(i,1); hidden.value = JSON.stringify(values); render(); } };
  });
}

// Colors
function initColorRows(colors) { const list = document.getElementById('colors-list'); list.innerHTML = ''; colors.forEach(c => addColorRowWith(c.name, c.hex)); syncColors(); }
function addColorRow() { addColorRowWith('', '#888880'); syncColors(); }
function addColorRowWith(name, hex) {
  const list = document.getElementById('colors-list'); const row = document.createElement('div'); row.className = 'color-row';
  row.innerHTML = `<input type="color" value="${hex}" oninput="syncColors()" /><input placeholder="Hex" value="${esc(hex)}" oninput="this.previousElementSibling.value=this.value;syncColors()" style="font-family:monospace" /><input placeholder="Nom" value="${esc(name)}" oninput="syncColors()" /><button class="btn btn-ghost btn-sm" onclick="this.closest('.color-row').remove();syncColors()">×</button>`;
  list.appendChild(row);
}
function syncColors() {
  const colors = [...document.querySelectorAll('.color-row')].map(r => { const ins = r.querySelectorAll('input'); return { hex: ins[1].value||ins[0].value, name: ins[2].value }; }).filter(c => c.name||c.hex);
  document.getElementById('f-colors').value = JSON.stringify(colors);
}

// Images
function getImages() { return JSON.parse(document.getElementById('f-images').value || '[]'); }
function setImages(arr) { document.getElementById('f-images').value = JSON.stringify(arr); renderImgList(arr); }
function renderImgList(imgs) { document.getElementById('image-list').innerHTML = imgs.map((url,i)=>`<div class="image-thumb"><img src="${esc(url)}" onerror="this.style.opacity=.3"/><span class="image-thumb__del" onclick="removeImage(${i})">×</span></div>`).join(''); }
function removeImage(i) { const a = getImages(); a.splice(i,1); setImages(a); }
function addImageUrl() { const inp = document.getElementById('f-img-url'); const url = inp.value.trim(); if (!url) return; const arr = getImages(); arr.push(url); setImages(arr); inp.value = ''; }

async function handleImgFile(input) {
  const file = input.files[0]; if (!file) return;
  const label = document.querySelector('.upload-zone'); label.textContent = 'Upload en cours…';
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const r = await apiFetch(API.upload, 'POST', { base64, filename: file.name, mimeType: file.type });
    if (r.ok) { const arr = getImages(); arr.push(r.url); setImages(arr); toast('Image uploadée dans GitHub'); }
    else toast(r.error || 'Erreur upload', 'error');
    label.innerHTML = '↑ Glisser ou cliquer pour uploader (max 4Mo)';
    input.value = '';
  };
  reader.readAsDataURL(file);
}

async function handleImgDrop(e) {
  e.preventDefault(); document.querySelector('.upload-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(',')[1];
    const r = await apiFetch(API.upload, 'POST', { base64, filename: file.name, mimeType: file.type });
    if (r.ok) { const arr = getImages(); arr.push(r.url); setImages(arr); toast('Image uploadée'); }
    else toast(r.error || 'Erreur', 'error');
  };
  reader.readAsDataURL(file);
}

async function saveProduct() {
  const btn = document.getElementById('modal-save-btn'); btn.disabled = true;
  const payload = {
    id: state.editingId || (slugifyLocal(document.getElementById('f-name').value) + '-' + Date.now()),
    name: document.getElementById('f-name').value.trim(),
    category: document.getElementById('f-cat').value,
    price: parseFloat(document.getElementById('f-price').value) || 0,
    originalPrice: document.getElementById('f-orig').value ? parseFloat(document.getElementById('f-orig').value) : null,
    badge: document.getElementById('f-badge').value.trim() || null,
    description: document.getElementById('f-desc').value.trim(),
    details: JSON.parse(document.getElementById('f-details').value || '[]'),
    sizes: JSON.parse(document.getElementById('f-sizes').value || '[]'),
    colors: JSON.parse(document.getElementById('f-colors').value || '[]'),
    images: JSON.parse(document.getElementById('f-images').value || '[]'),
    inStock: document.getElementById('f-instock').checked,
    featured: document.getElementById('f-featured').checked,
    order: state.editingId ? (state.data.products.find(p => p.id === state.editingId)?.order ?? 0) : state.data.products.length,
    stock: state.editingId
      ? (state.data.products.find(p => p.id === state.editingId)?.stock ?? null)
      : null,
  };
  if (!payload.name) { toast('Le nom est requis', 'error'); btn.disabled = false; return; }
  if (state.editingId) {
    const idx = state.data.products.findIndex(p => p.id === state.editingId);
    if (idx > -1) state.data.products[idx] = payload;
  } else {
    state.data.products.push(payload);
  }
  markChanged(state.data);
  btn.disabled = false;
  toast('Produit enregistré — clique Publier pour mettre en ligne');
  closeModal();
  navigate('products');
}

function slugifyLocal(text) {
  return text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

    headline:    document.getElementById('h-headline').value,
    subheadline: document.getElementById('h-sub').value,
    cta:         document.getElementById('h-cta').value,
    ctaHref:     document.getElementById('h-href').value,
    badge:       document.getElementById('h-badge').value,
  };
  markChanged(state.data);
  toast('Hero enregistré — clique Publier pour mettre en ligne');
}

function addValue() {
  const list = document.getElementById('values-list'); const i = list.querySelectorAll('div').length;
  const div = document.createElement('div'); div.style = 'display:flex;gap:.5rem;margin-bottom:.5rem';
  div.innerHTML = `<input placeholder="◎" style="width:56px;text-align:center" id="vi-${i}" /><input placeholder="Valeur…" style="flex:1" id="vl-${i}" /><button class="btn btn-ghost btn-sm" onclick="this.closest('div').remove()" style="color:var(--danger)">×</button>`;
  list.appendChild(div);
}

async function saveAbout() {
  const rows = document.querySelectorAll('#values-list > div');
  const values = [...rows].map((_,i) => ({
    icon:  document.getElementById(`vi-${i}`)?.value || '',
    label: document.getElementById(`vl-${i}`)?.value || '',
  })).filter(v => v.label);
  state.data.about = {
    title:  document.getElementById('a-title').value,
    text:   document.getElementById('a-text').value,
    values,
  };
  markChanged(state.data);
  toast('À propos enregistré — clique Publier pour mettre en ligne');
}

// ── STOCK ─────────────────────────────────────────────────────
function renderStock(el) {
  const products = state.data.products || [];
  const sym = state.data.brand?.currencySymbol || '€';

  // Calcule le statut global d'un produit depuis son stock
  function globalStatus(p) {
    const s = p.stock;
    if (!s) return { qty: '—', cls: 'muted' };
    const bsc = s.bySizeColor;
    if (bsc && Object.keys(bsc).length) {
      const vals = Object.values(bsc).flatMap(c => Object.values(c));
      const total = vals.reduce((a, b) => a + b, 0);
      const min   = Math.min(...vals);
      if (total === 0) return { qty: 0,     cls: 'danger' };
      if (min   <= 3)  return { qty: total, cls: 'warn'   };
      return { qty: total, cls: 'ok' };
    }
    const g = s.global ?? 0;
    if (g === 0) return { qty: 0, cls: 'danger' };
    if (g <= 3)  return { qty: g, cls: 'warn' };
    return { qty: g, cls: 'ok' };
  }

  const statusBadge = (cls, qty) => {
    const map = {
      danger: ['badge-danger',  qty === 0 ? 'Épuisé' : qty],
      warn:   ['badge-warn',    qty],
      ok:     ['badge-success', qty],
      muted:  ['',              '—'],
    };
    const [bcls, label] = map[cls] || ['', '—'];
    return `<span class="badge ${bcls}" style="${cls==='warn'?'background:rgba(200,121,65,.15);color:#C87941':''}">${label}</span>`;
  };

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem">
      <p style="font-size:12px;color:var(--muted)">Clique sur un produit pour modifier ses stocks par taille et couleur.</p>
    </div>
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:1.5rem">
      <table class="products-table">
        <thead><tr>
          <th style="width:56px"></th>
          <th>Produit</th>
          <th>Catégorie</th>
          <th>Stock total</th>
          <th>Variantes épuisées</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${products.map(p => {
            const { qty, cls } = globalStatus(p);
            const bsc = p.stock?.bySizeColor || {};
            const outCount = Object.values(bsc)
              .flatMap(c => Object.values(c))
              .filter(v => v === 0).length;
            const totalVariants = Object.values(bsc)
              .flatMap(c => Object.values(c)).length;
            return `<tr>
              <td><img class="product-thumb" src="${p.images?.[0]||''}" onerror="this.style.visibility='hidden'" /></td>
              <td><strong>${p.name}</strong></td>
              <td style="color:var(--muted)">${p.category}</td>
              <td>${statusBadge(cls, qty)}</td>
              <td style="font-size:12px;color:${outCount>0?'#C25A5A':'var(--muted)'}">
                ${totalVariants > 0 ? `${outCount} / ${totalVariants}` : '—'}
              </td>
              <td><button class="btn btn-secondary btn-sm" onclick="openStockEditor('${p.id}')">Modifier</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <!-- ÉDITEUR STOCK (affiché en dessous quand on clique Modifier) -->
    <div id="stock-editor" style="display:none"></div>
  `;
}

function openStockEditor(productId) {
  const p = state.data.products.find(x => x.id === productId);
  if (!p) return;

  // Initialise stock si absent
  if (!p.stock) {
    p.stock = {
      global: p.inStock ? 10 : 0,
      bySizeColor: Object.fromEntries(
        p.sizes.map(s => [s, Object.fromEntries(p.colors.map(c => [c.name, p.inStock ? 10 : 0]))])
      )
    };
  }

  const editor = document.getElementById('stock-editor');
  if (!editor) return;
  editor.style.display = 'block';
  editor.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const sizes  = p.sizes  || [];
  const colors = p.colors || [];

  // Construit le tableau taille × couleur
  const tableHeader = `<tr><th style="min-width:80px">Taille \\ Couleur</th>${colors.map(c =>
    `<th><div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <span style="width:16px;height:16px;border-radius:50%;background:${c.hex};border:1px solid rgba(0,0,0,.15);display:inline-block"></span>
      <span style="font-size:10px">${c.name}</span>
    </div></th>`
  ).join('')}</tr>`;

  const tableRows = sizes.map(size => {
    const cells = colors.map(color => {
      const qty = p.stock.bySizeColor?.[size]?.[color.name] ?? 0;
      const cls = qty === 0 ? 'color:#C25A5A' : qty <= 3 ? 'color:#C87941' : 'color:#6A9E7A';
      return `<td>
        <input
          type="number" min="0" max="9999"
          value="${qty}"
          data-size="${size}" data-color="${color.name}"
          onchange="updateStockCell('${productId}', this)"
          style="width:68px;text-align:center;font-weight:500;${cls}"
        />
      </td>`;
    }).join('');
    return `<tr><td style="font-size:12px;font-weight:500;color:var(--text)">${size}</td>${cells}</tr>`;
  }).join('');

  editor.innerHTML = `
    <div class="card">
      <div class="card-title" style="margin-bottom:1rem">
        <span>Stocks — ${p.name}</span>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('stock-editor').style.display='none'">✕ Fermer</button>
      </div>

      <div style="overflow-x:auto;margin-bottom:1.5rem">
        <table class="products-table" style="min-width:400px">
          <thead>${tableHeader}</thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>

      <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;padding-top:1rem;border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:.6rem">
          <span style="font-size:12px;color:var(--muted)">Tout mettre à :</span>
          <input type="number" min="0" id="bulk-qty" value="10" style="width:72px;text-align:center" />
          <button class="btn btn-secondary btn-sm" onclick="bulkSetStock('${productId}')">Appliquer à tous</button>
        </div>
        <div style="display:flex;gap:.5rem;margin-left:auto">
          <span style="font-size:11px;color:var(--muted);align-self:center">
            <span style="color:#6A9E7A">●</span> OK &nbsp;
            <span style="color:#C87941">●</span> Faible (≤3) &nbsp;
            <span style="color:#C25A5A">●</span> Épuisé
          </span>
        </div>
      </div>

      <p style="font-size:11px;color:var(--muted);margin-top:.75rem">
        Les modifications sont sauvegardées localement. Clique <strong>Publier</strong> en haut pour mettre en ligne.
      </p>
    </div>
  `;
}

function updateStockCell(productId, input) {
  const p = state.data.products.find(x => x.id === productId);
  if (!p || !p.stock) return;

  const size  = input.dataset.size;
  const color = input.dataset.color;
  const qty   = Math.max(0, parseInt(input.value) || 0);

  if (!p.stock.bySizeColor[size]) p.stock.bySizeColor[size] = {};
  p.stock.bySizeColor[size][color] = qty;

  // Recalcule le stock global
  const allQtys = Object.values(p.stock.bySizeColor).flatMap(c => Object.values(c));
  p.stock.global = allQtys.reduce((a, b) => a + b, 0);

  // Sync inStock
  p.inStock = p.stock.global > 0;

  // Couleur du champ
  input.style.color = qty === 0 ? '#C25A5A' : qty <= 3 ? '#C87941' : '#6A9E7A';

  markChanged(state.data);
}

function bulkSetStock(productId) {
  const qty = Math.max(0, parseInt((document.getElementById('bulk-qty') as HTMLInputElement).value) || 0);
  const p   = state.data.products.find(x => x.id === productId);
  if (!p || !p.stock) return;

  // Met à jour toutes les cellules
  Object.keys(p.stock.bySizeColor).forEach(size => {
    Object.keys(p.stock.bySizeColor[size]).forEach(color => {
      p.stock.bySizeColor[size][color] = qty;
    });
  });
  p.stock.global = qty * Object.values(p.stock.bySizeColor).flatMap(c => Object.values(c)).length;
  p.inStock = qty > 0;

  markChanged(state.data);
  toast('Stock mis à jour — clique Publier pour mettre en ligne');
  openStockEditor(productId); // re-render
  renderStock(document.getElementById('page-content')); // refresh table
  // Re-ouvre l'éditeur
  setTimeout(() => openStockEditor(productId), 50);
}

// ── INIT ─────────────────────────────────────────────────────
checkAuth();
</script>
